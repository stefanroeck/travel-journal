<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reisetagebuch</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin="">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha384-PPIZEGYM1v8zp5Py7UjFb79S58UeqCL9pYVnVPURKEqvioPROaVAJKKLzvH2rDnI" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.10/css/weather-icons.min.css" integrity="sha384-z7urxOoxW8XTxSu9GHfjF2IMOLNAJ5YBGVEiX0qaKfOzOhfH/HceecZevk7aFifJ" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__title-group">
        <button id="travel-menu-button" class="menu-button" aria-label="Reisemenü öffnen" aria-expanded="false" aria-controls="travel-menu">
          <span aria-hidden="true">☰</span>
        </button>
        <div>
          <p class="eyebrow">Reisetagebuch</p>
          <h1 id="travel-title">Meine Reiseroute</h1>
        </div>
        <nav id="travel-menu" class="travel-menu" aria-label="Reise auswählen" hidden></nav>
      </div>
    </header>

    <div class="day-nav-group">
      <nav id="day-nav" class="day-nav" aria-label="Reisetage"></nav>
      <section id="track-summary" class="track-summary" aria-label="Track-Zusammenfassung">
        <div class="track-summary__title">
          <strong id="track-name"></strong>
        </div>
        <div id="track-stats" class="track-summary__stats"></div>
      </section>
    </div>

    <main class="layout">
      <div class="left-column">
        <section class="map-panel" aria-label="Track-Karte">
          <div id="map"></div>
        </section>

        <section class="content-section notes-section">
          <div class="section-heading">
            <h2>Notizen</h2>
            <span id="note-date"></span>
          </div>
          <article id="notes" class="notes"></article>
        </section>
      </div>

      <aside class="right-column" aria-label="Tagesdetails">
        <section class="content-section photos-section">
          <div class="section-heading">
            <h2>Fotos</h2>
            <span id="photo-count"></span>
          </div>
          <div id="photos" class="photo-grid"></div>
        </section>
      </aside>
    </main>

    <div id="photo-viewer" class="photo-viewer" hidden>
      <button class="photo-viewer__backdrop" type="button" aria-label="Foto schließen"></button>
      <figure class="photo-viewer__content">
        <button class="photo-viewer__close" type="button" aria-label="Foto schließen">&times;</button>
        <button class="photo-viewer__nav photo-viewer__nav--prev" type="button" data-photo-nav="-1" aria-label="Vorheriges Foto">&lsaquo;</button>
        <img id="photo-viewer-image" src="" alt="">
        <button class="photo-viewer__nav photo-viewer__nav--next" type="button" data-photo-nav="1" aria-label="Nächstes Foto">&rsaquo;</button>
        <figcaption id="photo-viewer-caption"></figcaption>
      </figure>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-gpx@1.7.0/gpx.js"></script>
    <script src="app.js"></script>
  </body>
</html>
